baseURL = "https://shometrics.github.io/"
title = "Sho Metrics"
locale = "en-US"
defaultContentLanguage = "en"
relativeURLs = true
canonifyURLs = false
disableKinds = ["taxonomy", "term", "RSS"]
enableRobotsTXT = true

[params]
description = "A Stream Deck plugin for clear, glanceable system metrics."
ogImage = "og-image.png"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
