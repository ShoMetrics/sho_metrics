{{ define "main" }}
<section class="page-shell">
  <header class="page-header">
    <p class="eyebrow">Sho Metrics</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </header>
  <div class="page-content">
    {{ .Content }}
    {{ if .Pages }}
    <div class="link-list">
      {{ range .Pages.ByWeight }}
      <a href="{{ .RelPermalink }}">
        <span>{{ .Title }}</span>
        {{ with .Description }}<small>{{ . }}</small>{{ end }}
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
