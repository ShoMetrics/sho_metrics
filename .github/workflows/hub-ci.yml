name: Hub CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: packages/hub

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  checks:
    name: Hub checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint proto
        run: npm run proto:lint

      - name: Build proto
        run: npm run proto:build

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Run Property Inspector DOM tests
        run: npm run test:pi

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hub-unit-coverage
          path: packages/hub/coverage/unit
          if-no-files-found: ignore

      - name: Build plugin
        run: npm run build

  visual:
    name: Hub visual snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run visual tests
        run: npm run test:visual

      - name: Upload visual test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hub-visual-report
          path: packages/hub/playwright-report
          if-no-files-found: ignore

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hub-visual-diffs
          path: packages/hub/test-results/visual
          if-no-files-found: ignore
