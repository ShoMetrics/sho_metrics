name: Windows Source CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh
    working-directory: packages/source-windows

jobs:
  tests:
    name: C# tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run lint
        run: ./scripts/Test-SourceWindowsLint.ps1

      - name: Run tests with coverage
        run: dotnet test ShoMetrics.Source.Windows.slnx --configuration Release --no-restore --settings SourceWindows.coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-windows-coverage
          path: packages/source-windows/TestResults
          if-no-files-found: ignore
