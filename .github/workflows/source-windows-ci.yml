name: Windows Source CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh
    working-directory: packages/source-windows

jobs:
  unit-tests:
    name: C# unit tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: packages/source-windows/**/packages.lock.json

      - name: Run lint
        run: ./scripts/Test-SourceWindowsLint.ps1

      - name: Run tests with coverage
        # Keep cross-process smoke out of the coverage run so unit failures and
        # process-startup failures produce separate CI signals. The lint step
        # already builds the Release solution, so this step should only execute
        # tests and collect coverage.
        run: dotnet test ShoMetrics.Source.Windows.UnitTests.slnx --configuration Release --no-build --no-restore --settings SourceWindows.coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-windows-unit-coverage
          path: packages/source-windows/TestResults
          if-no-files-found: ignore

  integration-smoke:
    name: Windows helper integration smoke
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: packages/source-windows/**/packages.lock.json

      - name: Restore integration smoke
        run: dotnet restore ShoMetrics.Source.Windows.IntegrationTests/ShoMetrics.Source.Windows.IntegrationTests.csproj

      - name: Run integration smoke
        run: dotnet test ShoMetrics.Source.Windows.IntegrationTests/ShoMetrics.Source.Windows.IntegrationTests.csproj --configuration Release --no-restore --results-directory IntegrationTestResults
        env:
          SHOMETRICS_SOURCE_WINDOWS_TEST_ARTIFACT_DIR: ${{ github.workspace }}/packages/source-windows/IntegrationTestResults/integration-diagnostics

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-windows-integration-diagnostics
          path: packages/source-windows/IntegrationTestResults
          if-no-files-found: ignore

  installer-smoke:
    name: Windows installer smoke
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            packages/source-windows/**/packages.lock.json
            packages/installer/windows/inno/*.lock.json

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: packages/assets/brand/package-lock.json

      - name: Restore brand asset tooling
        working-directory: ${{ github.workspace }}/packages/assets/brand
        run: npm.cmd ci

      - name: Run installer invariant checks
        working-directory: ${{ github.workspace }}
        run: ./packages/installer/windows/scripts/Test-WindowsInstallerInvariants.ps1

      - name: Build standalone installer
        working-directory: ${{ github.workspace }}
        run: ./packages/installer/windows/Build-WindowsInstaller.ps1 -Configuration Release -RuntimeIdentifier win-x64 -ShoMetricsVersionPrefix 0.1.0

      - name: Build framework-dependent installer
        working-directory: ${{ github.workspace }}
        run: ./packages/installer/windows/Build-WindowsInstaller.ps1 -Configuration Release -RuntimeIdentifier win-x64 -ShoMetricsVersionPrefix 0.1.0 -Distribution FrameworkDependent

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: shometrics-helper-installer-win-x64
          path: artifacts/installer/windows/setup/**/*.exe
          if-no-files-found: error
