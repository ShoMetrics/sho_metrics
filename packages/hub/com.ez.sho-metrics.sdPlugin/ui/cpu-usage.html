<!DOCTYPE html>
<html>

<head lang="en">
    <title>Metric Settings</title>
    <meta charset="utf-8" />
    <script src="./vendor/sdpi-components/sdpi-components.js"></script>
    <script>
        if (!window.SDPIComponents) {
            document.write('<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"><\/script>');
        }
    </script>
    <style>
        body {
            background-color: #2d2d2d;
            color: #efefef;
            font-family: sans-serif;
        }

        .settings-section[hidden] {
            display: none;
        }

        .usage-range {
            align-items: center;
            border-radius: 4px;
            color: #111827;
            cursor: pointer;
            display: flex;
            font-size: 11px;
            font-weight: 700;
            justify-content: center;
            min-height: 24px;
            overflow: hidden;
            padding: 5px 8px;
            position: relative;
            text-align: center;
            user-select: none;
            width: 100%;
        }

        .usage-range span {
            line-height: 1;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        .usage-range input[type="color"] {
            cursor: pointer;
            inset: 0;
            opacity: 0;
            position: absolute;
            width: 100%;
        }

        .range-control {
            align-items: center;
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr 40px;
            width: 100%;
        }

        .range-control input[type="range"] {
            width: 100%;
        }

        .range-value {
            color: #efefef;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        .color-band-control {
            width: 100%;
        }

        .section-note {
            color: #b8b8b8;
            font-size: 12px;
            line-height: 1.35;
            margin: 6px 0 0;
        }

        .circle-options {
            margin-top: 6px;
        }

        .native-select,
        .native-input {
            appearance: none;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            color: #efefef;
            min-height: 28px;
            padding: 4px 8px;
            width: 100%;
        }
    </style>
</head>

<body>
    <sdpi-item label="Polling Frequency">
        <sdpi-select id="pollingFrequencySeconds" setting="pollingFrequencySeconds" default="1">
            <option value="1">1s</option>
            <option value="2">2s</option>
            <option value="3">3s</option>
            <option value="5">5s</option>
            <option value="10">10s</option>
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Graphic Type">
        <sdpi-select id="graphicType" setting="graphicType" default="circular">
            <option value="circular">Circular</option>
            <option value="linear">Linear</option>
            <option value="dashed-line">Sparkline</option>
        </sdpi-select>
    </sdpi-item>

    <section class="settings-section circle-options" data-graphic-section="circular">
        <sdpi-item label="Center Content">
            <sdpi-select id="circularCenterContent" setting="circularCenterContent" default="value">
                <option value="value">Value</option>
                <option value="icon">Minimal Icon</option>
            </sdpi-select>
        </sdpi-item>
    </section>

    <section class="settings-section" data-action-section="net-speed" hidden>
        <sdpi-item label="Network Metric">
            <sdpi-select id="networkDirection" setting="networkDirection" default="download">
                <option value="download">Download</option>
                <option value="upload">Upload</option>
            </sdpi-select>
        </sdpi-item>

        <sdpi-item>
            <p class="section-note">A circle can show one direction at a time.</p>
        </sdpi-item>

        <section class="settings-section" data-net-speed-circular-section hidden>
            <sdpi-item label="Network Interface">
                <select id="networkInterfaceId" class="native-select" setting="networkInterfaceId">
                    <option value="">Automatic</option>
                </select>
            </sdpi-item>

            <sdpi-item label="Max Speed (Mbps)">
                <input id="maximumNetworkSpeedMbps" class="native-input" type="number" min="1" step="1" placeholder="Auto" />
            </sdpi-item>

            <sdpi-item label="Unit">
                <select id="networkUnitBase">
                    <option value="byte">Byte/s</option>
                    <option value="bit">Bit/s</option>
                </select>
            </sdpi-item>

            <sdpi-item label="Download Icon">
                <sdpi-color id="downloadIconColor" setting="downloadIconColor" default="#3b82f6"></sdpi-color>
            </sdpi-item>

            <sdpi-item label="Upload Icon">
                <sdpi-color id="uploadIconColor" setting="uploadIconColor" default="#ef4444"></sdpi-color>
            </sdpi-item>
        </section>
    </section>

    <section class="settings-section" data-action-section="disk" hidden>
        <sdpi-item label="Disk Metric">
            <select id="diskMetricKind" class="native-select">
                <option value="usage">Usage</option>
                <option value="throughput" data-mac-only>Throughput</option>
            </select>
        </sdpi-item>

        <section class="settings-section" data-disk-section="usage">
            <sdpi-item label="Volume">
                <select id="diskVolumeId" class="native-select">
                    <option value="">Automatic</option>
                </select>
            </sdpi-item>

            <sdpi-item label="Usage Display">
                <select id="diskUsageDisplayMode" class="native-select">
                    <option value="percentage">Percentage</option>
                    <option value="space">Free Space</option>
                </select>
            </sdpi-item>
        </section>

        <section class="settings-section" data-disk-section="throughput" hidden>
            <sdpi-item label="Direction">
                <select id="diskThroughputDirection" class="native-select">
                    <option value="total">Total</option>
                    <option value="read">Read</option>
                    <option value="write">Write</option>
                </select>
            </sdpi-item>

            <sdpi-item label="Max Speed (MiB/s)">
                <input id="maximumDiskThroughputMebibytesPerSecond" class="native-input" type="number" min="1" step="1" placeholder="1000" />
            </sdpi-item>
        </section>
    </section>

    <section class="settings-section" data-action-section="gpu-temp" hidden>
        <sdpi-item label="Unit">
            <select id="temperatureUnit" class="native-select">
                <option value="celsius">Celsius</option>
                <option value="fahrenheit">Fahrenheit</option>
            </select>
        </sdpi-item>

        <section class="settings-section" data-temperature-scale-section hidden>
            <sdpi-item label="Max Temp (C)">
                <input id="maximumTemperatureCelsius" class="native-input" type="number" min="1" step="1" placeholder="100" />
            </sdpi-item>
        </section>
    </section>

    <sdpi-item label="Graphic Style">
        <sdpi-select setting="graphicStyle" default="flat">
            <option value="flat">Default</option>
            <option value="cupertino-glass">Cupertino Glass Style</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Color Mode">
        <sdpi-select id="colorMode" setting="colorMode" default="threshold">
            <option value="threshold">Dynamic (By Percentage)</option>
            <option value="solid">Solid Color</option>
        </sdpi-select>
    </sdpi-item>

    <section class="settings-section" data-color-section="solid" hidden>
        <sdpi-item label="Solid Color">
            <sdpi-color setting="solidColor" default="#3b82f6"></sdpi-color>
        </sdpi-item>
    </section>

    <section class="settings-section" data-color-section="threshold">
        <sdpi-heading>Dynamic Usage Colors</sdpi-heading>

        <sdpi-item>
            <p class="section-note">Set the usage ranges that choose low, medium, or high color.</p>
        </sdpi-item>

        <sdpi-item label="Low Ends At">
            <div class="range-control">
                <input id="lowThreshold" type="range" min="0" max="100" step="1" value="30" />
                <span id="lowThresholdValue" class="range-value">30%</span>
            </div>
        </sdpi-item>

        <sdpi-item label="High Starts At">
            <div class="range-control">
                <input id="highThreshold" type="range" min="0" max="100" step="1" value="70" />
                <span id="highThresholdValue" class="range-value">70%</span>
            </div>
        </sdpi-item>

        <sdpi-item label="Low Usage Color">
            <div class="color-band-control">
                <label id="lowRangeLabel" class="usage-range">
                    <span id="lowRangeText">0-30%</span>
                    <input id="colorLow" type="color" value="#22c55e" />
                </label>
            </div>
        </sdpi-item>

        <sdpi-item label="Medium Usage Color">
            <div class="color-band-control">
                <label id="mediumRangeLabel" class="usage-range">
                    <span id="mediumRangeText">30-70%</span>
                    <input id="colorMedium" type="color" value="#eab308" />
                </label>
            </div>
        </sdpi-item>

        <sdpi-item label="High Usage Color">
            <div class="color-band-control">
                <label id="highRangeLabel" class="usage-range">
                    <span id="highRangeText">70-100%</span>
                    <input id="colorHigh" type="color" value="#ef4444" />
                </label>
            </div>
        </sdpi-item>
    </section>

    <script>
        const { streamDeckClient } = SDPIComponents;

        const defaultSettings = {
            colorMode: "threshold",
            pollingFrequencySeconds: 1,
            graphicType: "circular",
            circularCenterContent: "value",
            networkDirection: "download",
            networkInterfaceId: "",
            availableNetworkInterfaces: "[]",
            maximumNetworkSpeedMbps: "",
            networkUnitBase: "byte",
            downloadIconColor: "#3b82f6",
            uploadIconColor: "#ef4444",
            netSpeedDefaultsApplied: false,
            diskMetricKind: "usage",
            diskUsageDisplayMode: "percentage",
            diskThroughputDirection: "total",
            diskVolumeId: "",
            availableDiskVolumes: "[]",
            maximumDiskThroughputMebibytesPerSecond: 1000,
            diskDefaultsApplied: false,
            maximumTemperatureCelsius: 100,
            temperatureUnit: "celsius",
            lowThreshold: 30,
            highThreshold: 70,
            colorLow: "#22c55e",
            colorMedium: "#eab308",
            colorHigh: "#ef4444",
        };

        const pollingFrequencyControl = document.getElementById("pollingFrequencySeconds");
        const graphicTypeControl = document.getElementById("graphicType");
        const circularCenterContentControl = document.getElementById("circularCenterContent");
        const networkDirectionControl = document.getElementById("networkDirection");
        const networkInterfaceControl = document.getElementById("networkInterfaceId");
        const maximumNetworkSpeedInput = document.getElementById("maximumNetworkSpeedMbps");
        const networkUnitBaseControl = document.getElementById("networkUnitBase");
        const downloadIconColorControl = document.getElementById("downloadIconColor");
        const uploadIconColorControl = document.getElementById("uploadIconColor");
        const diskMetricKindControl = document.getElementById("diskMetricKind");
        const diskUsageDisplayModeControl = document.getElementById("diskUsageDisplayMode");
        const diskThroughputDirectionControl = document.getElementById("diskThroughputDirection");
        const diskVolumeControl = document.getElementById("diskVolumeId");
        const maximumDiskThroughputInput = document.getElementById("maximumDiskThroughputMebibytesPerSecond");
        const maximumTemperatureCelsiusInput = document.getElementById("maximumTemperatureCelsius");
        const temperatureUnitControl = document.getElementById("temperatureUnit");
        const colorModeControl = document.getElementById("colorMode");
        const lowThresholdInput = document.getElementById("lowThreshold");
        const highThresholdInput = document.getElementById("highThreshold");
        const lowThresholdValueLabel = document.getElementById("lowThresholdValue");
        const highThresholdValueLabel = document.getElementById("highThresholdValue");
        const lowColorControl = document.getElementById("colorLow");
        const mediumColorControl = document.getElementById("colorMedium");
        const highColorControl = document.getElementById("colorHigh");
        const lowRangeLabel = document.getElementById("lowRangeLabel");
        const mediumRangeLabel = document.getElementById("mediumRangeLabel");
        const highRangeLabel = document.getElementById("highRangeLabel");
        const lowRangeText = document.getElementById("lowRangeText");
        const mediumRangeText = document.getElementById("mediumRangeText");
        const highRangeText = document.getElementById("highRangeText");

        let currentSettings = { ...defaultSettings };
        let currentActionUuid = "";
        let isWindowsPropertyInspector = false;

        streamDeckClient.didReceiveSettings.subscribe((event) => {
            currentSettings = normalizeSettings(event.payload.settings);
            applySettingsToControls();
        });

        document.addEventListener("input", syncSettingsFromControls, true);
        document.addEventListener("change", syncSettingsFromControls, true);
        pollingFrequencyControl.addEventListener("input", syncSettingsFromControls);
        pollingFrequencyControl.addEventListener("change", syncSettingsFromControls);
        graphicTypeControl.addEventListener("input", syncSettingsFromControls);
        graphicTypeControl.addEventListener("change", syncSettingsFromControls);
        circularCenterContentControl.addEventListener("input", syncSettingsFromControls);
        circularCenterContentControl.addEventListener("change", syncSettingsFromControls);
        networkDirectionControl.addEventListener("input", syncSettingsFromControls);
        networkDirectionControl.addEventListener("change", syncSettingsFromControls);
        networkInterfaceControl.addEventListener("input", syncSettingsFromControls);
        networkInterfaceControl.addEventListener("change", syncSettingsFromControls);
        maximumNetworkSpeedInput.addEventListener("input", syncSettingsFromControls);
        maximumNetworkSpeedInput.addEventListener("change", syncSettingsFromControls);
        networkUnitBaseControl.addEventListener("input", syncSettingsFromControls);
        networkUnitBaseControl.addEventListener("change", syncSettingsFromControls);
        diskMetricKindControl.addEventListener("input", syncSettingsFromControls);
        diskMetricKindControl.addEventListener("change", syncSettingsFromControls);
        diskUsageDisplayModeControl.addEventListener("input", syncSettingsFromControls);
        diskUsageDisplayModeControl.addEventListener("change", syncSettingsFromControls);
        diskThroughputDirectionControl.addEventListener("input", syncSettingsFromControls);
        diskThroughputDirectionControl.addEventListener("change", syncSettingsFromControls);
        diskVolumeControl.addEventListener("input", syncSettingsFromControls);
        diskVolumeControl.addEventListener("change", syncSettingsFromControls);
        maximumDiskThroughputInput.addEventListener("input", syncSettingsFromControls);
        maximumDiskThroughputInput.addEventListener("change", syncSettingsFromControls);
        maximumTemperatureCelsiusInput.addEventListener("input", syncSettingsFromControls);
        maximumTemperatureCelsiusInput.addEventListener("change", syncSettingsFromControls);
        temperatureUnitControl.addEventListener("input", syncSettingsFromControls);
        temperatureUnitControl.addEventListener("change", syncSettingsFromControls);
        colorModeControl.addEventListener("input", syncSettingsFromControls);
        colorModeControl.addEventListener("change", syncSettingsFromControls);

        lowThresholdInput.addEventListener("input", () => updateThresholds("low"));
        highThresholdInput.addEventListener("input", () => updateThresholds("high"));
        lowColorControl.addEventListener("input", () => updateUsageColor("colorLow", lowColorControl.value));
        mediumColorControl.addEventListener("input", () => updateUsageColor("colorMedium", mediumColorControl.value));
        highColorControl.addEventListener("input", () => updateUsageColor("colorHigh", highColorControl.value));
        loadSettings();

        async function loadSettings() {
            const connectionInfo = await streamDeckClient.getConnectionInfo();
            const payload = await streamDeckClient.getSettings();
            currentActionUuid = readActionUuid(connectionInfo);
            isWindowsPropertyInspector = resolveIsWindowsPropertyInspector(connectionInfo);
            currentSettings = normalizeSettings(payload.settings);
            applySettingsToControls();
        }

        function applySettingsToControls() {
            pollingFrequencyControl.value = String(currentSettings.pollingFrequencySeconds);
            graphicTypeControl.value = currentSettings.graphicType;
            circularCenterContentControl.value = currentSettings.circularCenterContent;
            networkDirectionControl.value = currentSettings.networkDirection;
            colorModeControl.value = currentSettings.colorMode;
            renderNetworkInterfaceOptions();
            networkInterfaceControl.value = currentSettings.networkInterfaceId;
            maximumNetworkSpeedInput.value = normalizeOptionalPositiveNumber(currentSettings.maximumNetworkSpeedMbps);
            networkUnitBaseControl.value = currentSettings.networkUnitBase;
            configurePlatformSpecificOptions();
            diskMetricKindControl.value = currentSettings.diskMetricKind;
            diskUsageDisplayModeControl.value = currentSettings.diskUsageDisplayMode;
            diskThroughputDirectionControl.value = currentSettings.diskThroughputDirection;
            renderDiskVolumeOptions();
            diskVolumeControl.value = currentSettings.diskVolumeId;
            maximumDiskThroughputInput.value = normalizePositiveNumber(
                currentSettings.maximumDiskThroughputMebibytesPerSecond,
                defaultSettings.maximumDiskThroughputMebibytesPerSecond,
            );
            maximumTemperatureCelsiusInput.value = normalizePositiveNumber(
                currentSettings.maximumTemperatureCelsius,
                defaultSettings.maximumTemperatureCelsius,
            );
            temperatureUnitControl.value = currentSettings.temperatureUnit;
            lowThresholdInput.value = normalizeThreshold(currentSettings.lowThreshold, defaultSettings.lowThreshold);
            highThresholdInput.value = normalizeThreshold(currentSettings.highThreshold, defaultSettings.highThreshold);
            lowColorControl.value = currentSettings.colorLow;
            mediumColorControl.value = currentSettings.colorMedium;
            highColorControl.value = currentSettings.colorHigh;
            enforceThresholdOrder("low");
            setVisibleActionOptions(currentActionUuid);
            setVisibleGraphicOptions(currentSettings.graphicType);
            setVisibleNetworkCircularOptions();
            setVisibleDiskOptions();
            setVisibleTemperatureScaleOptions();
            setVisibleColorMode(currentSettings.colorMode);
            renderUsageColorBands();
        }

        function updateThresholds(changedThreshold) {
            enforceThresholdOrder(changedThreshold);

            currentSettings = {
                ...currentSettings,
                lowThreshold: Number(lowThresholdInput.value),
                highThreshold: Number(highThresholdInput.value),
            };

            renderUsageColorBands();
            streamDeckClient.setSettings(currentSettings);
        }

        function updateUsageColor(settingName, colorValue) {
            currentSettings = {
                ...currentSettings,
                [settingName]: colorValue,
            };

            renderUsageColorBands();
            streamDeckClient.setSettings(currentSettings);
        }

        function enforceThresholdOrder(changedThreshold) {
            const lowThreshold = Number(lowThresholdInput.value);
            const highThreshold = Number(highThresholdInput.value);

            if (lowThreshold <= highThreshold) {
                return;
            }

            if (changedThreshold === "low") {
                highThresholdInput.value = lowThreshold;
                return;
            }

            lowThresholdInput.value = highThreshold;
        }

        function syncSettingsFromControls(event) {
            window.requestAnimationFrame(() => {
                const eventSetting = readEventSetting(event);
                const eventValue = readEventValue(event);
                const nextDiskMetricKind = normalizeDiskMetricKind(
                    eventSetting === "diskMetricKind" ? eventValue : diskMetricKindControl.value,
                );

                currentSettings = {
                    ...currentSettings,
                    pollingFrequencySeconds: eventSetting === "pollingFrequencySeconds"
                        ? normalizePollingFrequency(eventValue)
                        : eventSetting === "diskMetricKind"
                            ? resolveDefaultDiskPollingFrequency(nextDiskMetricKind)
                        : normalizePollingFrequency(readControlValue(
                            pollingFrequencyControl,
                            currentSettings.pollingFrequencySeconds,
                        )),
                    graphicType: eventSetting === "graphicType"
                        ? eventValue
                        : readControlValue(graphicTypeControl, currentSettings.graphicType),
                    circularCenterContent: eventSetting === "circularCenterContent"
                        ? eventValue
                        : readControlValue(circularCenterContentControl, currentSettings.circularCenterContent),
                    networkDirection: eventSetting === "networkDirection"
                        ? eventValue
                        : readControlValue(networkDirectionControl, currentSettings.networkDirection),
                    networkInterfaceId: eventSetting === "networkInterfaceId"
                        ? eventValue
                        : networkInterfaceControl.value,
                    maximumNetworkSpeedMbps: normalizeOptionalPositiveNumber(maximumNetworkSpeedInput.value),
                    networkUnitBase: networkUnitBaseControl.value === "bit" ? "bit" : "byte",
                    diskMetricKind: nextDiskMetricKind,
                    diskUsageDisplayMode: normalizeDiskUsageDisplayMode(diskUsageDisplayModeControl.value),
                    diskThroughputDirection: normalizeDiskThroughputDirection(diskThroughputDirectionControl.value),
                    diskVolumeId: eventSetting === "diskVolumeId" ? eventValue : diskVolumeControl.value,
                    maximumDiskThroughputMebibytesPerSecond: normalizePositiveNumber(
                        maximumDiskThroughputInput.value,
                        defaultSettings.maximumDiskThroughputMebibytesPerSecond,
                    ),
                    maximumTemperatureCelsius: normalizePositiveNumber(
                        maximumTemperatureCelsiusInput.value,
                        defaultSettings.maximumTemperatureCelsius,
                    ),
                    temperatureUnit: normalizeTemperatureUnit(temperatureUnitControl.value),
                    downloadIconColor: readControlValue(downloadIconColorControl, currentSettings.downloadIconColor),
                    uploadIconColor: readControlValue(uploadIconColorControl, currentSettings.uploadIconColor),
                    colorMode: eventSetting === "colorMode"
                        ? eventValue
                        : readControlValue(colorModeControl, currentSettings.colorMode),
                    solidColor: resolveNextSolidColor(eventSetting, eventValue),
                    netSpeedDefaultsApplied: currentActionUuid.endsWith("net-speed")
                        ? true
                        : currentSettings.netSpeedDefaultsApplied,
                    diskDefaultsApplied: currentActionUuid.endsWith("disk")
                        ? true
                        : currentSettings.diskDefaultsApplied,
                    colorLow: readControlValue(lowColorControl, currentSettings.colorLow),
                    colorMedium: readControlValue(mediumColorControl, currentSettings.colorMedium),
                    colorHigh: readControlValue(highColorControl, currentSettings.colorHigh),
                };

                setVisibleGraphicOptions(currentSettings.graphicType);
                setVisibleNetworkCircularOptions();
                setVisibleDiskOptions();
                setVisibleTemperatureScaleOptions();
                setVisibleColorMode(currentSettings.colorMode);
                pollingFrequencyControl.value = String(currentSettings.pollingFrequencySeconds);
                renderUsageColorBands();
                streamDeckClient.setSettings(currentSettings);
            });
        }

        function renderUsageColorBands() {
            const lowThreshold = Number(lowThresholdInput.value);
            const highThreshold = Number(highThresholdInput.value);

            lowThresholdValueLabel.textContent = `${lowThreshold}%`;
            highThresholdValueLabel.textContent = `${highThreshold}%`;
            lowRangeText.textContent = `0-${lowThreshold}%`;
            mediumRangeText.textContent = `${lowThreshold}-${highThreshold}%`;
            highRangeText.textContent = `${highThreshold}-100%`;

            lowRangeLabel.style.backgroundColor = currentSettings.colorLow;
            mediumRangeLabel.style.backgroundColor = currentSettings.colorMedium;
            highRangeLabel.style.backgroundColor = currentSettings.colorHigh;
        }

        function setVisibleColorMode(colorMode) {
            const visibleColorMode = colorMode === "solid" ? "solid" : "threshold";

            document.querySelectorAll("[data-color-section]").forEach((section) => {
                section.hidden = section.dataset.colorSection !== visibleColorMode;
            });
        }

        function setVisibleGraphicOptions(graphicType) {
            const visibleGraphicType = graphicType === "circular" ? "circular" : "";

            document.querySelectorAll("[data-graphic-section]").forEach((section) => {
                section.hidden = section.dataset.graphicSection !== visibleGraphicType;
            });
        }

        function setVisibleNetworkCircularOptions() {
            const shouldShow = currentActionUuid.endsWith("net-speed")
                && currentSettings.graphicType === "circular"
                && (currentSettings.networkDirection === "download" || currentSettings.networkDirection === "upload");

            document.querySelectorAll("[data-net-speed-circular-section]").forEach((section) => {
                section.hidden = !shouldShow;
            });
        }

        function setVisibleDiskOptions() {
            const visibleDiskSection = currentSettings.diskMetricKind === "throughput" ? "throughput" : "usage";

            document.querySelectorAll("[data-disk-section]").forEach((section) => {
                section.hidden = section.dataset.diskSection !== visibleDiskSection;
            });
        }

        function setVisibleTemperatureScaleOptions() {
            const shouldShow = currentActionUuid.endsWith("gpu-temp")
                && (currentSettings.graphicType === "circular" || currentSettings.graphicType === "linear");

            document.querySelectorAll("[data-temperature-scale-section]").forEach((section) => {
                section.hidden = !shouldShow;
            });
        }

        function setVisibleActionOptions(actionUuid) {
            document.querySelectorAll("[data-action-section]").forEach((section) => {
                section.hidden = !actionUuid.endsWith(section.dataset.actionSection);
            });
        }

        function renderNetworkInterfaceOptions() {
            const networkInterfaces = parseNetworkInterfaceOptions(currentSettings.availableNetworkInterfaces);
            const selectedValue = currentSettings.networkInterfaceId;

            networkInterfaceControl.replaceChildren(new Option("Automatic", ""));

            networkInterfaces.forEach((networkInterface) => {
                const speedLabel = networkInterface.speedMegabitsPerSecond
                    ? `, ${networkInterface.speedMegabitsPerSecond} Mbps`
                    : "";
                const defaultLabel = networkInterface.isDefault ? "default, " : "";
                const typeLabel = networkInterface.type === "unknown" ? "" : `${networkInterface.type}, `;
                const option = new Option(
                    `${networkInterface.name} (${defaultLabel}${typeLabel}${networkInterface.id}${speedLabel})`,
                    networkInterface.id,
                );
                networkInterfaceControl.add(option);
            });

            networkInterfaceControl.value = selectedValue;
        }

        function renderDiskVolumeOptions() {
            const diskVolumes = parseDiskVolumeOptions(currentSettings.availableDiskVolumes);
            const selectedValue = currentSettings.diskVolumeId;

            diskVolumeControl.replaceChildren(new Option("Automatic", ""));

            diskVolumes.forEach((diskVolume) => {
                const option = new Option(
                    `${diskVolume.mount || diskVolume.fs} (${formatByteCount(diskVolume.sizeBytes)})`,
                    diskVolume.id,
                );
                diskVolumeControl.add(option);
            });

            diskVolumeControl.value = selectedValue;
        }

        function parseDiskVolumeOptions(value) {
            if (typeof value !== "string") {
                return [];
            }

            try {
                const parsedValue = JSON.parse(value);

                if (!Array.isArray(parsedValue)) {
                    return [];
                }

                return parsedValue.filter((diskVolume) => (
                    typeof diskVolume.id === "string"
                    && typeof diskVolume.fs === "string"
                    && typeof diskVolume.mount === "string"
                    && typeof diskVolume.storageKind === "string"
                    && typeof diskVolume.diskName === "string"
                    && typeof diskVolume.sizeBytes === "number"
                ));
            } catch {
                return [];
            }
        }

        function formatByteCount(bytes) {
            const units = ["B", "KB", "MB", "GB", "TB", "PB"];
            let value = Math.max(0, Number(bytes));
            let unitIndex = 0;

            while (value >= 1024 && unitIndex < units.length - 1) {
                value /= 1024;
                unitIndex += 1;
            }

            return `${value >= 10 ? value.toFixed(0) : value.toFixed(1)} ${units[unitIndex]}`;
        }

        function configurePlatformSpecificOptions() {
            document.querySelectorAll("[data-mac-only]").forEach((option) => {
                option.hidden = isWindowsPropertyInspector;
                option.disabled = isWindowsPropertyInspector;
            });
        }

        function parseNetworkInterfaceOptions(value) {
            if (typeof value !== "string") {
                return [];
            }

            try {
                const parsedValue = JSON.parse(value);

                if (!Array.isArray(parsedValue)) {
                    return [];
                }

                return parsedValue.filter((networkInterface) => (
                    typeof networkInterface.id === "string"
                    && typeof networkInterface.name === "string"
                    && typeof networkInterface.type === "string"
                ));
            } catch {
                return [];
            }
        }

        function readControlValue(control, fallbackValue) {
            if (!control) {
                return fallbackValue;
            }

            if (typeof control.value === "string" && control.value.length > 0) {
                return control.value;
            }

            const shadowInput = control.shadowRoot?.querySelector("input, select");

            if (typeof shadowInput?.value === "string" && shadowInput.value.length > 0) {
                return shadowInput.value;
            }

            return control.getAttribute("value") ?? fallbackValue;
        }

        function readEventSetting(event) {
            return event.composedPath()
                .find((element) => element?.getAttribute?.("setting"))
                ?.getAttribute("setting");
        }

        function readEventValue(event) {
            const eventPathValue = event.composedPath()
                .find((element) => typeof element?.value === "string" && element.value.length > 0)
                ?.value;

            return eventPathValue ?? event.target?.value ?? currentSettings.colorMode;
        }

        function normalizeThreshold(value, fallbackValue) {
            const numericValue = Number(value);

            if (!Number.isFinite(numericValue)) {
                return fallbackValue;
            }

            return Math.min(Math.max(Math.round(numericValue), 0), 100);
        }

        function normalizePositiveNumber(value, fallbackValue) {
            const numericValue = Number(value);

            if (!Number.isFinite(numericValue) || numericValue <= 0) {
                return fallbackValue;
            }

            return Math.round(numericValue);
        }

        function normalizeOptionalPositiveNumber(value) {
            if (value === "" || value == null) {
                return "";
            }

            const numericValue = Number(value);

            if (!Number.isFinite(numericValue) || numericValue <= 0) {
                return "";
            }

            return Math.round(numericValue);
        }

        function normalizeSettings(settings) {
            const shouldApplyNetSpeedDefaults = currentActionUuid.endsWith("net-speed")
                && settings.netSpeedDefaultsApplied !== true;
            const shouldApplyDiskDefaults = currentActionUuid.endsWith("disk")
                && settings.diskDefaultsApplied !== true;
            const normalizedNetworkDirection = normalizeNetworkDirection(settings.networkDirection);
            const normalizedDiskMetricKind = normalizeDiskMetricKind(settings.diskMetricKind);

            return {
                ...defaultSettings,
                ...settings,
                pollingFrequencySeconds: shouldApplyDiskDefaults
                    || (currentActionUuid.endsWith("disk") && settings.pollingFrequencySeconds == null)
                    ? resolveDefaultDiskPollingFrequency(normalizedDiskMetricKind)
                    : normalizePollingFrequency(settings.pollingFrequencySeconds),
                graphicType: settings.graphicType ?? defaultSettings.graphicType,
                circularCenterContent: settings.circularCenterContent ?? defaultSettings.circularCenterContent,
                networkDirection: normalizedNetworkDirection,
                networkInterfaceId: settings.networkInterfaceId ?? defaultSettings.networkInterfaceId,
                availableNetworkInterfaces: settings.availableNetworkInterfaces ?? defaultSettings.availableNetworkInterfaces,
                maximumNetworkSpeedMbps: normalizeOptionalPositiveNumber(settings.maximumNetworkSpeedMbps),
                networkUnitBase: settings.networkUnitBase === "bit" ? "bit" : "byte",
                maximumTemperatureCelsius: normalizePositiveNumber(
                    settings.maximumTemperatureCelsius,
                    defaultSettings.maximumTemperatureCelsius,
                ),
                temperatureUnit: normalizeTemperatureUnit(settings.temperatureUnit),
                diskMetricKind: normalizedDiskMetricKind,
                diskUsageDisplayMode: normalizeDiskUsageDisplayMode(settings.diskUsageDisplayMode),
                diskThroughputDirection: normalizeDiskThroughputDirection(settings.diskThroughputDirection),
                diskVolumeId: settings.diskVolumeId ?? defaultSettings.diskVolumeId,
                availableDiskVolumes: settings.availableDiskVolumes ?? defaultSettings.availableDiskVolumes,
                maximumDiskThroughputMebibytesPerSecond: normalizePositiveNumber(
                    settings.maximumDiskThroughputMebibytesPerSecond ?? settings.maximumDiskThroughputMbps,
                    defaultSettings.maximumDiskThroughputMebibytesPerSecond,
                ),
                downloadIconColor: settings.downloadIconColor ?? defaultSettings.downloadIconColor,
                uploadIconColor: settings.uploadIconColor ?? defaultSettings.uploadIconColor,
                colorMode: shouldApplyNetSpeedDefaults ? "solid" : (settings.colorMode ?? resolveDefaultColorMode()),
                solidColor: shouldApplyNetSpeedDefaults
                    ? resolveDefaultSolidColor(normalizedNetworkDirection)
                    : (settings.solidColor ?? resolveDefaultSolidColor(normalizedNetworkDirection)),
                netSpeedDefaultsApplied: currentActionUuid.endsWith("net-speed")
                    ? true
                    : settings.netSpeedDefaultsApplied,
                diskDefaultsApplied: currentActionUuid.endsWith("disk")
                    ? true
                    : settings.diskDefaultsApplied,
                colorMedium: settings.colorMedium ?? settings.colorMid ?? defaultSettings.colorMedium,
            };
        }

        function normalizeNetworkDirection(value) {
            return value === "upload" ? "upload" : "download";
        }

        function normalizeTemperatureUnit(value) {
            return value === "fahrenheit" ? "fahrenheit" : "celsius";
        }

        function normalizeDiskMetricKind(value) {
            if (isWindowsPropertyInspector && value === "throughput") {
                return "usage";
            }

            return value === "throughput" ? "throughput" : "usage";
        }

        function normalizeDiskUsageDisplayMode(value) {
            return value === "space" ? "space" : "percentage";
        }

        function normalizeDiskThroughputDirection(value) {
            if (value === "read" || value === "write") {
                return value;
            }

            return "total";
        }

        function resolveDefaultDiskPollingFrequency(diskMetricKind) {
            return diskMetricKind === "throughput" ? 1 : 60;
        }

        function normalizePollingFrequency(value) {
            const numericValue = Number(value);
            const allowedValues = [1, 2, 3, 5, 10, 15, 30, 60];

            return allowedValues.includes(numericValue)
                ? numericValue
                : defaultSettings.pollingFrequencySeconds;
        }

        function resolveNextSolidColor(eventSetting, eventValue) {
            if (eventSetting !== "networkDirection" || !currentActionUuid.endsWith("net-speed")) {
                return currentSettings.solidColor;
            }

            const currentDefaultColor = resolveDefaultSolidColor(currentSettings.networkDirection);

            if (currentSettings.solidColor && currentSettings.solidColor !== currentDefaultColor) {
                return currentSettings.solidColor;
            }

            return resolveDefaultSolidColor(eventValue);
        }

        function resolveDefaultColorMode() {
            return currentActionUuid.endsWith("net-speed") ? "solid" : defaultSettings.colorMode;
        }

        function resolveDefaultSolidColor(networkDirection) {
            return normalizeNetworkDirection(networkDirection) === "upload"
                ? defaultSettings.uploadIconColor
                : defaultSettings.downloadIconColor;
        }

        function readActionUuid(connectionInfo) {
            return connectionInfo.actionInfo?.action
                ?? connectionInfo.actionInfo?.uuid
                ?? connectionInfo.action
                ?? "";
        }

        function resolveIsWindowsPropertyInspector(connectionInfo) {
            const platformValue = String(
                connectionInfo.application?.platform
                    ?? connectionInfo.info?.application?.platform
                    ?? navigator.platform
                    ?? "",
            ).toLowerCase();

            return platformValue.includes("win");
        }
    </script>
</body>
