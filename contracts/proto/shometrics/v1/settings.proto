syntax = "proto3";

package shometrics.v1;

import "buf/validate/validate.proto";
import "shometrics/v1/snapshot.proto";

option csharp_namespace = "ShoMetrics.Contracts.V1";

// Persisted Stream Deck action settings.
//
// These messages are intended to be stored as plain ProtoJSON in the Stream
// Deck SDK settings object. Do not wrap them in binary/base64 unless there is
// a measured reason to give up readable exported profiles and logs.
//
// Stream Deck profiles are SDK-level layout snapshots that group actions.
// They may embed this same JSON shape as per-action settings, but profile
// layout itself is not modeled here.
//
// Stored settings are sparse. The application resolver owns defaults, global
// cascade, controller/platform checks, and runtime-only facts.
message StoredWidgetSettings {
  // The stored widget identity is part of our contract. Stream Deck action
  // UUIDs still route events to code, but they are not the only source of
  // truth for what this instance displays. This keeps published action UUIDs
  // stable while allowing future profile presets and internal refactors.
  //
  // New widget behavior gets a new oneof arm. Hardware quick-start actions
  // should create one of these widget shapes with default slots; hardware
  // identity is not the root widget type.
  oneof widget {
    SingleMetricWidget single_metric = 1;
    DenseMultiMetricWidget dense_multi_metric = 2;
    StackedMetricWidget stacked_metric = 3;
  }

  WidgetPreferences preferences = 10;
}

message SingleMetricWidget {
  optional MetricSlot slot = 1;
}

message DenseMultiMetricWidget {
  // Ordered rows rendered by the dense progress-list view.
  // Valid stored length is 2..6.
  repeated DenseMetricSlot slots = 1 [(buf.validate.field).repeated = {
    min_items: 2
    max_items: 6
  }];

  // Shared appearance for the dense list. Dense consumes theme, paint, and
  // widget-owned transparent surface settings. It ignores view and line
  // settings in v1.
  AppearanceSettings appearance = 2;
}

message DenseMetricSlot {
  // Stable PI/render identity. Generated by Hub and opaque to users.
  string slot_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];

  optional MetricSlot slot = 2;

  // User-owned row label for the dense list. Absence means use the selected
  // metric's detected/default short label. The PI should guide users toward
  // short labels; renderer pixel fitting is the final authority.
  optional string custom_label = 3 [(buf.validate.field).string.max_len = 16];

  // User-owned row maximum in the metric's raw source unit. Absence means use
  // the selected metric's semantic/default maximum. This value affects progress
  // only; it does not change display-unit formatting.
  optional double custom_maximum_value = 4 [(buf.validate.field).double = {
    gt: 0
    lte: 1000000000000000
  }];
}

message StackedMetricWidget {
  // Ordered slots displayed one at a time.
  // Valid stored length is 2..3.
  repeated StackedMetricSlot slots = 1 [(buf.validate.field).repeated = {
    min_items: 2
    max_items: 3
  }];

  // Rotation behavior for the stacked widget. Absence means product defaults:
  // auto-rotate enabled with a 3 second interval.
  StackedMetricRotationSettings rotation = 2;
}

message StackedMetricSlot {
  // Stable PI/runtime identity. Generated by Hub and opaque to users.
  string slot_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];

  // V1 supports only a complete single-metric widget per stacked slot. Future
  // nested widget support must add explicit arms here instead of storing a
  // generic StoredWidgetSettings blob.
  oneof item {
    SingleMetricWidget single_metric = 2;
  }
}

message StackedMetricRotationSettings {
  // Absence means enabled.
  optional bool auto_rotate_enabled = 1;

  // Absence means 3 seconds.
  optional uint32 interval_seconds = 2 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 5
  }];
}

// A slot is one metric position inside a widget layout. SingleMetricWidget has
// one slot; future multi-slot widgets should reuse this concept instead of
// inventing a separate metric-selection shape.
message MetricSlot {
  optional MetricSelection metric = 1;

  // Slot overrides stay with the metric they affect. This keeps future
  // multi-slot widgets from sharing one ambiguous widget-level appearance,
  // scale, or channel-color setting across unrelated metrics.
  optional SlotOverrides overrides = 2;
}

message MetricSelection {
  // Source profile choice is optional so existing local metrics can use the
  // resolver's default source profile. Widgets reference profile IDs here;
  // MetricSourceProfile.source_type_id names the registry-owned source type.
  MetricSourcePolicy source_policy = 1;

  // First-class targets are metrics ShoMetrics understands semantically and
  // can tune precisely for rendering, defaults, labels, units, and presets.
  //
  // Catalog targets are for arbitrary readings exposed by a descriptor
  // producing source, such as a deep hardware monitor, local probe, or remote
  // machine agent. User-authored HTTP/CLI probes should use their own target
  // shape instead of being folded into the catalog target.
  oneof target {
    CpuMetricTarget cpu = 10;
    MemoryMetricTarget memory = 11;
    NetworkMetricTarget network = 12;
    DiskMetricTarget disk = 13;
    GpuMetricTarget gpu = 14;
    CatalogMetricTarget catalog = 20;
    CustomMetricTarget custom = 30;
  }
}

message SlotOverrides {
  AppearanceSettings appearance = 1;
  NetworkDisplaySettings network = 2;
  DiskThroughputDisplaySettings disk_throughput = 3;
}

message MetricSourcePolicy {
  enum FailureMode {
    FAILURE_MODE_UNSPECIFIED = 0;
    FAILURE_MODE_SHOW_UNAVAILABLE = 1;
    FAILURE_MODE_USE_FALLBACK = 2;
  }

  optional string primary_source_profile_id = 1 [(buf.validate.field).string.max_len = 128];
  repeated string fallback_source_profile_ids = 2 [(buf.validate.field).repeated.items.string.max_len = 128];
  optional FailureMode failure_mode = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message CpuMetricTarget {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_USAGE = 1;
    KIND_TEMPERATURE = 2;
    KIND_POWER = 3;
  }

  optional Kind kind = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // These display settings are meaningful only for the corresponding CPU
  // metric kinds. If CPU target settings grow further, split kind-specific
  // fields into oneof sub-messages together with the similar GPU/Disk cleanup.
  optional uint32 maximum_temperature_celsius = 2 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 200
  }];
  optional uint32 maximum_power_watts = 3 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 2000
  }];
  optional TemperatureUnit temperature_unit = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message MemoryMetricTarget {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_USAGE = 1;
  }

  optional Kind kind = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message NetworkMetricTarget {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_TRAFFIC = 1;
    KIND_PING = 2;
  }

  optional Kind kind = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional Traffic traffic = 2;
  optional Ping ping = 3;

  message Traffic {
    enum Direction {
      DIRECTION_UNSPECIFIED = 0;
      DIRECTION_BOTH = 1;
      DIRECTION_DOWNLOAD = 2;
      DIRECTION_UPLOAD = 3;
    }

    enum TrafficDisplayMode {
      TRAFFIC_DISPLAY_MODE_UNSPECIFIED = 0;
      TRAFFIC_DISPLAY_MODE_MIRRORED = 1;
      TRAFFIC_DISPLAY_MODE_OVERLAY = 2;
    }

    optional Direction direction = 1 [(buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }];
    optional string interface_id = 2 [(buf.validate.field).string.max_len = 256];
    optional TrafficDisplayMode traffic_display_mode = 3 [(buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }];
  }

  message Ping {
    optional string target_host = 1 [(buf.validate.field).string.max_len = 253];
  }
}

message DiskMetricTarget {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_USAGE = 1;
    KIND_THROUGHPUT = 2;
  }

  enum ThroughputDirection {
    THROUGHPUT_DIRECTION_UNSPECIFIED = 0;
    THROUGHPUT_DIRECTION_BOTH = 1;
    THROUGHPUT_DIRECTION_READ = 2;
    THROUGHPUT_DIRECTION_WRITE = 3;
  }

  enum UsageDisplayMode {
    USAGE_DISPLAY_MODE_UNSPECIFIED = 0;
    USAGE_DISPLAY_MODE_PERCENTAGE = 1;
    USAGE_DISPLAY_MODE_SPACE = 2;
  }

  optional Kind kind = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional string volume_id = 2 [(buf.validate.field).string.max_len = 512];

  // Fields below are kind-specific. throughput_direction is only meaningful
  // for Kind.KIND_THROUGHPUT; usage_display_mode and bar_label are only
  // meaningful for Kind.KIND_USAGE. If either branch grows further, split
  // into oneof sub-messages together with the similar GpuMetricTarget cleanup.
  optional ThroughputDirection throughput_direction = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional UsageDisplayMode usage_display_mode = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  optional string bar_label = 5 [(buf.validate.field).string.max_len = 32];
}

message GpuMetricTarget {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_USAGE = 1;
    KIND_TEMPERATURE = 2;
    KIND_VRAM = 3;
    KIND_POWER = 4;
  }

  optional Kind kind = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional string gpu_id = 2 [(buf.validate.field).string.max_len = 256];

  // These display ceilings are meaningful only for the corresponding GPU
  // metric kinds. Keeping them on the GPU target avoids one widget-level value
  // being shared accidentally by future multi-slot widgets. If GPU target
  // settings grow further, split kind-specific fields into oneof sub-messages
  // together with the similar DiskMetricTarget cleanup.
  optional uint32 maximum_temperature_celsius = 3 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 200
  }];
  optional uint32 maximum_power_watts = 4 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 2000
  }];
  optional TemperatureUnit temperature_unit = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message CatalogMetricTarget {
  // Source-scoped normalized metric id produced by a source adapter.
  //
  // Treat this as opaque in settings and resolver code. Do not parse path
  // separators or assume a source-specific shape such as Windows PDH counter
  // paths, Linux hwmon chip/feature/subfeature names, macOS SMC keys, or
  // external hardware-monitor sensor paths. Each source adapter owns the
  // mapping from its native identifiers into this id.
  optional string metric_id = 1 [(buf.validate.field).string.max_len = 1024];

  // Source-derived display hints captured when the user selected this metric.
  // These are not user overrides. They keep the widget useful when the source
  // descriptor catalog is unavailable.
  optional string detected_label = 2 [(buf.validate.field).string.max_len = 128];
  optional MetricUnit detected_unit = 3 [(buf.validate.field).enum = {defined_only: true}];
  optional CatalogMetricCategory detected_category = 4 [(buf.validate.field).enum = {defined_only: true}];
  optional CatalogMetricReadingKind detected_reading_kind = 5 [(buf.validate.field).enum = {defined_only: true}];

  // User-owned display overrides. Absence means use detected/default behavior.
  optional string custom_label = 6 [(buf.validate.field).string.max_len = 128];
  optional double custom_maximum_value = 7 [(buf.validate.field).double = {
    gt: 0
    lte: 1000000000000000
  }];
}

message CustomMetricTarget {
  oneof source {
    CustomHttpMetricSource http = 1;
  }
}

message CustomHttpMetricSource {
  oneof plan {
    SingleCustomHttpRequest single_request = 1;
  }
}

message SingleCustomHttpRequest {
  // HTTP GET URL returning JSON. Query strings may be stored because public
  // no-auth APIs often need them, but logs and runtime metric ids must use only
  // a sanitized hostname.
  optional string url = 1 [(buf.validate.field).string.max_len = 2048];

  // User-authored natural-language intent used to regenerate or explain the jq
  // transform. The runtime does not execute this text and does not require it
  // after a jq transform has been configured.
  optional string user_intent = 2 [(buf.validate.field).string.max_len = 2048];

  // jq filter that outputs the V1 Custom Metric single-object schema.
  optional string jq_transform = 3 [(buf.validate.field).string.max_len = 32768];
}

enum CatalogMetricCategory {
  CATALOG_METRIC_CATEGORY_UNSPECIFIED = 0;
  CATALOG_METRIC_CATEGORY_CPU = 1;
  CATALOG_METRIC_CATEGORY_GPU = 2;
  CATALOG_METRIC_CATEGORY_MEMORY = 3;
  CATALOG_METRIC_CATEGORY_DISK = 4;
  CATALOG_METRIC_CATEGORY_NETWORK = 5;
  CATALOG_METRIC_CATEGORY_OTHER = 6;
}

enum CatalogMetricReadingKind {
  CATALOG_METRIC_READING_KIND_UNSPECIFIED = 0;
  CATALOG_METRIC_READING_KIND_USAGE = 1;
  CATALOG_METRIC_READING_KIND_TEMPERATURE = 2;
  CATALOG_METRIC_READING_KIND_POWER = 3;
  CATALOG_METRIC_READING_KIND_CLOCK = 4;
  CATALOG_METRIC_READING_KIND_FAN = 5;
  CATALOG_METRIC_READING_KIND_VOLTAGE = 6;
  CATALOG_METRIC_READING_KIND_CURRENT = 7;
  CATALOG_METRIC_READING_KIND_DATA = 8;
  CATALOG_METRIC_READING_KIND_THROUGHPUT = 9;
  CATALOG_METRIC_READING_KIND_TIMING = 10;
  CATALOG_METRIC_READING_KIND_LEVEL = 11;
  CATALOG_METRIC_READING_KIND_CONTROL = 12;
  CATALOG_METRIC_READING_KIND_OTHER = 13;
}

// WidgetPreferences holds behavior shared by the whole widget instance.
// Metric-specific display parameters belong in their respective *MetricTarget
// or SlotOverrides message so future multi-slot widgets stay unambiguous.
message WidgetPreferences {
  optional uint32 polling_frequency_seconds = 1 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 3600
  }];
}

message StoredGlobalSettings {
  optional GlobalDefaults defaults = 1;
  optional GlobalOverrides overrides = 2;

  // Source profiles are global because many widgets may read from the same
  // local or remote machine. Widgets store only source profile IDs in
  // MetricSourcePolicy.
  repeated MetricSourceProfile source_profiles = 3;
  optional string default_source_profile_id = 4 [(buf.validate.field).string.max_len = 128];

  // Color compensation is stored globally because it describes Stream Deck
  // display behavior, not one widget's metric choice. The resolver does not
  // consume this field until runtime support is intentionally added.
  optional ColorCompensationSettings color_compensation = 5;
}

message ColorCompensationSettings {
  // Profile used when no device-specific target below matches. This is the
  // current POC behavior: one compensation profile for all Stream Deck output.
  optional ColorCompensationProfile fallback_profile = 1;

  // Future per-device or per-display-surface overrides. POC writes must leave
  // this empty, and POC readers must ignore it. Adding target-aware matching
  // is an intentional resolver change, not a silent behavior shift.
  //
  // App-level invariant: targets must be unique by (stream_deck_device_id,
  // surface_id). The proto cannot enforce this with a map because the key is
  // composite. Future storage write paths must reject duplicate targets before
  // saving.
  repeated TargetColorCompensationProfile target_profiles = 2;
}

message TargetColorCompensationProfile {
  ColorCompensationTarget target = 1;
  ColorCompensationProfile profile = 2;
}

message ColorCompensationTarget {
  // Only this id participates in matching. Display hints below are for UI and
  // diagnostics only.
  ColorCompensationTargetId id = 1;

  // Human-readable hint captured when the profile is written. This is not
  // identity and must not be used to match a device.
  optional string device_display_name = 10 [(buf.validate.field).string.max_len = 128];
}

message ColorCompensationTargetId {
  // Opaque Stream Deck SDK device id, available from ActionContext.device.id
  // or Device.id. Each physical Stream Deck has a unique id regardless of
  // model, so two Stream Deck XLs can still be distinguished. Do not derive
  // this from model, display name, size, or action coordinates.
  optional string stream_deck_device_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  // Optional display-surface id inside one device, for future support where
  // different screens on the same hardware need different compensation, such
  // as Stream Deck +'s keypad LCDs versus its touch strip.
  //
  // Convention when this is set: use the lowercased SDK Controller value,
  // such as "keypad" or "encoder", for current Stream Deck hardware. New
  // surface types should agree on a new lowercase tag here before shipping.
  // Current storage always leaves this unset; POC matching is device-only.
  optional string surface_id = 2 [(buf.validate.field).string.max_len = 128];
}

message ColorCompensationProfile {
  optional int32 brightness_adjustment = 1 [(buf.validate.field).int32 = {
    gte: -10
    lte: 10
  }];
  optional int32 shadow_adjustment = 2 [(buf.validate.field).int32 = {
    gte: -10
    lte: 10
  }];
  optional int32 gamma_adjustment = 3 [(buf.validate.field).int32 = {
    gte: -10
    lte: 10
  }];
  optional int32 saturation_adjustment = 4 [(buf.validate.field).int32 = {
    gte: -10
    lte: 10
  }];
}

message MetricSourceProfile {
  optional string id = 1 [(buf.validate.field).string.max_len = 128];
  optional string display_name = 2 [(buf.validate.field).string.max_len = 128];

  // Source type IDs are registry-owned strings, not enums. This lets the app
  // add local probes, remote agents, and other descriptor-producing source
  // adapters without changing persisted settings for every new implementation.
  optional string source_type_id = 3 [(buf.validate.field).string.max_len = 128];

  oneof connection {
    HttpMetricSourceConnection http = 10;
  }
}

message HttpMetricSourceConnection {
  // Base URL for a source endpoint, for example a local native probe or a
  // remote host agent. The resolver/source registry decides whether this field
  // is required for a given source_type_id.
  optional string base_url = 1 [(buf.validate.field).string.max_len = 2048];

  // Do not store API tokens, passwords, cookies, or other secrets directly in
  // Stream Deck settings. Future authenticated connections should store a
  // credential reference here and keep the secret in the OS credential store.
}

message GlobalDefaults {
  NetworkDisplaySettings network = 1;
  DiskThroughputDisplaySettings disk_throughput = 2;
}

message GlobalOverrides {
  // Main switch for global override. When enabled, omitted subsection enabled
  // fields resolve to enabled so one click applies view, theme, paint, and
  // transparent surface overrides.
  optional bool enabled = 1;
  GlobalViewOverride view = 2;
  GlobalThemeOverride theme = 3;
  GlobalPaintOverride paint = 4;
  GlobalTransparentSurfaceOverride transparent_surface = 5;
}

// AppearanceSettings describes the visual presentation of one metric. It is
// grouped by user-facing domains instead of flattening view, theme, paint, and
// line settings into one broad message.
message AppearanceSettings {
  AppearanceViewSettings view = 1;
  AppearanceThemeSettings theme = 2;
  LineAppearanceSettings line = 3;

  // Transparent surface tuning is widget-owned instead of theme-owned. Users
  // tune it for readability over their background, and changing theme should
  // not reset that widget-level choice.
  TransparentSurfaceSettings transparent_surface = 4;
}

message AppearanceViewSettings {
  // Main visual form for one metric slot. Composite widgets, such as a touch
  // strip with two circle views, should be modeled as a future
  // StoredWidgetSettings widget oneof arm instead of being added here.
  optional MetricView selected_view = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // Circle owns its variants here so other view families can add their own
  // variant fields later without introducing invalid cross-view combinations.
  optional CircleViewVariant circle_variant = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // Text owns its variants here so centered metric text and title-card
  // typography remain view-level choices instead of theme or renderer details.
  optional TextViewVariant text_variant = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message AppearanceThemeSettings {
  // Theme is a user-facing visual theme, not a renderer primitive name. New
  // themes should be enum additions here and mapped to renderer contracts by
  // the visual adapter.
  optional MetricTheme selected_theme = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  FlatThemeSettings flat = 2;
  CupertinoGlassThemeSettings cupertino_glass = 3;
  ColorFilledThemeSettings color_filled = 4;

  // Terminal owns its variants inside one theme so users can choose between a
  // clean terminal look and the more opinionated vintage screen treatment
  // without splitting them into separate themes.
  TerminalThemeSettings terminal = 5;
}

message TransparentSurfaceSettings {
  optional bool enabled = 1;
  optional uint32 background_opacity_percent = 2 [(buf.validate.field).uint32.lte = 100];
  optional uint32 text_outline_percent = 3 [(buf.validate.field).uint32.lte = 100];
  optional uint32 shape_outline_percent = 4 [(buf.validate.field).uint32.lte = 100];
}

message FlatThemeSettings {
  // Metric accent paint controls ring, large text, bar fill, and line stroke.
  MetricPaintSettings paint = 1;
}

message CupertinoGlassThemeSettings {
  // Metric accent paint controls foreground metric emphasis for now. Future
  // glass tint or glass material settings belong in this message, not in Flat.
  MetricPaintSettings paint = 1;
}

message ColorFilledThemeSettings {
  // Color Filled paint controls the widget background fill. Foreground paint is
  // derived by the renderer for legibility.
  ColorFilledPaintSettings paint = 1;
}

message TerminalThemeSettings {
  optional TerminalThemeVariant variant = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // Terminal paint is theme-owned because terminal palettes control the whole
  // foreground treatment, including text, dim text, and glow.
  TerminalPaintSettings paint = 2;
}

message TerminalPaintSettings {
  // Selected phosphor palette for Terminal. The resolver owns concrete RGB
  // values so stored settings keep product-level intent.
  optional TerminalPalettePreset preset = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message MetricPaintSettings {
  // User-facing metric color treatment. Multi-color means value-driven metric
  // color bands for ordinary metric graphics; B&W is a final paint constraint
  // applied by the visual adapter.
  optional ColorMode color_mode = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  MetricSolidPaintSettings solid = 2;
  MetricMultiColorPaintSettings multi_color = 3;
}

message MetricSolidPaintSettings {
  MetricSolidChannelColors colors = 1;

  // When unset, the resolver enables smooth gradients for solid metric paint.
  optional bool gradient_enabled = 2;
}

message MetricSolidChannelColors {
  // Channel colors are named fields while the channel set is fixed. If
  // channels become user-defined, replace them with a repeated message keyed
  // by stable channel IDs.
  optional string usage_color = 1 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string download_color = 2 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string upload_color = 3 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string disk_read_color = 4 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string disk_write_color = 5 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
}

message MetricMultiColorPaintSettings {
  option (buf.validate.message).cel = {
    id: "multi_color_threshold_order"
    message: "low_threshold_percent must be less than or equal to high_threshold_percent"
    expression:
      "!has(this.low_threshold_percent) || !has(this.high_threshold_percent) || "
      "this.low_threshold_percent <= this.high_threshold_percent"
  };

  MetricMultiColorChannelColors colors = 1;

  // Color thresholds are normalized percentage stops for multi-color band selection,
  // not alert rules and not raw metric values such as Celsius, watts, or ms.
  optional uint32 low_threshold_percent = 2 [(buf.validate.field).uint32.lte = 100];
  optional uint32 high_threshold_percent = 3 [(buf.validate.field).uint32.lte = 100];

  // When unset, the resolver enables smooth gradients for multi-color metric
  // paint.
  optional bool gradient_enabled = 4;
}

message MetricMultiColorChannelColors {
  MultiColorSet usage = 1;
  MultiColorSet download = 2;
  MultiColorSet upload = 3;
  MultiColorSet disk_read = 4;
  MultiColorSet disk_write = 5;
}

message MultiColorSet {
  optional string low_color = 1 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string medium_color = 2 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
  optional string high_color = 3 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];
}

message ColorFilledPaintSettings {
  // In Color Filled, solid and multi-color choose the widget background fill
  // branch instead of ordinary metric paint.
  optional ColorMode color_mode = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  ColorFilledSolidPaintSettings solid = 2;
  ColorFilledMultiColorPaintSettings multi_color = 3;
}

message ColorFilledSolidPaintSettings {
  optional string color = 1 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];

  // When unset, the resolver enables smooth gradients for the filled
  // background.
  optional bool gradient_enabled = 2;
}

message ColorFilledMultiColorPaintSettings {
  MultiColorSet colors = 1;

  // When unset, the resolver enables smooth gradients for the filled
  // background.
  optional bool gradient_enabled = 2;
}

message LineAppearanceSettings {
  enum GridLineVisibility {
    GRID_LINE_VISIBILITY_UNSPECIFIED = 0;
    GRID_LINE_VISIBILITY_ADAPTIVE = 1;
    GRID_LINE_VISIBILITY_ALWAYS = 2;
    GRID_LINE_VISIBILITY_NONE = 3;
  }

  enum GridLineType {
    GRID_LINE_TYPE_UNSPECIFIED = 0;
    GRID_LINE_TYPE_HORIZONTAL = 1;
    GRID_LINE_TYPE_VERTICAL = 2;
  }

  optional uint32 line_smoothing_percent = 1 [(buf.validate.field).uint32.lte = 100];
  optional GridLineVisibility grid_line_visibility = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional GridLineType grid_line_type = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message GlobalViewOverride {
  // When unset and global override is enabled, the resolver treats this
  // subsection as enabled.
  optional bool enabled = 1;
  AppearanceViewSettings view = 2;
}

message GlobalThemeOverride {
  // When unset and global override is enabled, the resolver treats this
  // subsection as enabled.
  optional bool enabled = 1;
  AppearanceThemeSettings theme = 2;
}

message GlobalTransparentSurfaceOverride {
  // When unset and global override is enabled, the resolver treats this
  // subsection as enabled.
  optional bool enabled = 1;

  // Global override also stores one transparent surface setting because this
  // axis expresses readability over the user's background, not theme identity.
  TransparentSurfaceSettings transparent_surface = 2;
}

message GlobalPaintOverride {
  // When unset and global override is enabled, the resolver treats this
  // subsection as enabled.
  //
  // This is intentionally one global paint override switch. It is not stored
  // per theme: when enabled, the resolver applies the active branch below based
  // on each widget's effective theme.
  optional bool enabled = 1;

  // Used when the effective theme is Flat or Cupertino Glass.
  GlobalMetricPaintSettings metric = 2;

  // Used when the effective theme is Color Filled.
  ColorFilledPaintSettings color_filled = 3;

  // Used when the effective theme is Terminal.
  TerminalPaintSettings terminal = 4;
}

message GlobalMetricPaintSettings {
  // Global metric paint intentionally uses one solid color and one multi-color
  // set for every metric channel. Widget-level metric paint remains
  // per-channel for fine-grained tuning.
  optional ColorMode color_mode = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  GlobalSolidPaintSettings solid = 2;
  GlobalMultiColorPaintSettings multi_color = 3;
}

message GlobalSolidPaintSettings {
  optional string color = 1 [(buf.validate.field).string.pattern = "^#[0-9a-fA-F]{6}$"];

  // When unset, the resolver enables smooth gradients for solid metric paint.
  optional bool gradient_enabled = 2;
}

message GlobalMultiColorPaintSettings {
  option (buf.validate.message).cel = {
    id: "global_multi_color_threshold_order"
    message: "low_threshold_percent must be less than or equal to high_threshold_percent"
    expression:
      "!has(this.low_threshold_percent) || !has(this.high_threshold_percent) || "
      "this.low_threshold_percent <= this.high_threshold_percent"
  };

  MultiColorSet colors = 1;

  // Color thresholds are normalized percentage stops for multi-color band selection,
  // not alert rules and not raw metric values such as Celsius, watts, or ms.
  optional uint32 low_threshold_percent = 2 [(buf.validate.field).uint32.lte = 100];
  optional uint32 high_threshold_percent = 3 [(buf.validate.field).uint32.lte = 100];

  // When unset, the resolver enables smooth gradients for multi-color metric
  // paint.
  optional bool gradient_enabled = 4;
}

