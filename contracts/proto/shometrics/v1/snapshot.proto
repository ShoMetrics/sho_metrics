syntax = "proto3";
package shometrics.v1;

// The universal snapshot format returned by any Metric Source (Node.js, C#, etc.)
message MetricSnapshot {
  string source_id = 1;          // e.g., "builtin-node", "win-native"
  uint64 timestamp_ms = 2;
  
  // A map of metric keys to their values (e.g., "gpu.usage_percent" -> MetricValue)
  map<string, MetricValue> metrics = 3;
}

message MetricValue {
  oneof data {
    double scalar = 1;
    string text = 2;
  }
  string unit = 3;               // e.g., "%", "°C", "MB/s", "W"
  double progress = 4;           // 0.0 to 1.0 hint for rendering progress bars/arcs
}
